<!-- 2. 引入正確的 SimpleLightbox 資源 (校準版網址) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.2/simple-lightbox.min.css" integrity="sha512-FaAQujRxLMvw+BkmGN3w7u9EdQQr1t0vQoY8KDh09+6SFaWSTe+KrT8oCWg25X91hytm5c5BTmiSGQejkraaZg==" crossorigin="anonymous" referrerpolicy="no-referrer">
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.2/simple-lightbox.min.js" integrity="sha512-/4kQE5RJQYHRhUiK+CZS8UhaJTnLmQkDuf8lOhiP2xLdjthA/rm0VqqWjcyelIx+NDyNHFmtqvuIgOFQnI34WA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
    // 3. 核心修正：強制在 DOM 完全加載後初始化
document.addEventListener('DOMContentLoaded', function() {
    // 1. 找出頁面上所有不同的 gallery 組別名字
    const galleryLinks = document.querySelectorAll('.gallery-link');
    const groupNames = new Set();
    galleryLinks.forEach(link => {
        if (link.dataset.gallery) groupNames.add(link.dataset.gallery);
    });

    // 2. 針對每一個組別，單獨啟動一個燈箱實例
// 針對每一組 A, B 系列單獨啟動
// 針對每一組 A, B 系列單獨啟動
groupNames.forEach(name => {
    try {
        new SimpleLightbox(`.gallery-link[data-gallery="${name}"]`, {
            overlayOpacity: 0.9,
            uniqueImages: false,
            swipeClose: true,
            showCounter: true,
            loop: true,
            fileExt: 'png|jpg|jpeg|gif|webp',
            close: true,
            closeText: '×',
            overlayClickClose: true, 
            alertError: false,
            history: false,
            /* 🚀 標題設定開始 */
            captions: true,
            captionSelector: 'self',
            captionType: 'title',
            captionPosition: 'bottom',
            captionDelay: 250
            /* 🚀 標題設定結束 */
        });
    } catch (e) {
        console.error("SimpleLightbox 初始化失敗:", e);
    }
});

});

    // 4. 年份摺疊功能 (維持妳原本正確的邏輯)
    function toggleYear(yearId) {
        const content = document.getElementById(yearId);
        const btn = event.currentTarget;
        const arrow = btn.querySelector('.arrow');
        
        content.classList.toggle('hidden');
        btn.classList.toggle('active-year');
        
        if (content.classList.contains('hidden')) {
            arrow.style.transform = 'rotate(-90deg)';
        } else {
            arrow.style.transform = 'rotate(0deg)';
        }
    }

    function toggleFab() {
    const menu = document.getElementById('fabMenu');
    menu.classList.toggle('show');
    
    // 讓主按鈕點擊時旋轉一下
    const mainBtn = document.querySelector('.fab-main');
    if(menu.classList.contains('show')) {
        mainBtn.style.transform = 'rotate(45deg) scale(1.1)';
    } else {
        mainBtn.style.transform = 'rotate(0) scale(1)';
    }
}
    
</script>
